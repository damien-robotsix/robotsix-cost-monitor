# robotsix-cost-monitor configuration.
#
# Copy to config/projects.yaml (gitignored) and fill in real keys.
# Each entry is one Langfuse project to monitor. Costs are read from each
# project's public API and shown per-project + aggregated in the dashboard.

projects:
  - name: robotsix-mill          # display label in the UI
    public_key: pk-lf-xxxxxxxx
    secret_key: sk-lf-xxxxxxxx
    base_url: https://langfuse.robotsix.net
    # Optional: an OpenRouter API/management key for this project, used by the
    # reconciliation view to compare provider-billed spend vs traced cost.
    openrouter_key: null

  # - name: another-project
  #   public_key: pk-lf-yyyyyyyy
  #   secret_key: sk-lf-yyyyyyyy
  #   base_url: https://cloud.langfuse.com
  #   openrouter_key: null

# Optional global settings.
settings:
  # Default time window (hours) for the dashboard trend/aggregations.
  default_window_hours: 168
  # Per-trace cost cache TTL (seconds).
  cache_ttl_seconds: 60
  # Reconciliation tolerance ($): drift below this is considered clean.
  reconcile_tolerance_usd: 1.0
  # Auto-run reconciliation every N hours (0 disables; default daily).
  reconcile_schedule_hours: 24.0
  # LLM cost-analyst (optional). Disabled until openrouter_key is set.
  # Runs a level-2 (robotsix-llmio tier-2) agent over the cost digest with a
  # level-3 sub-agent that drills into the most expensive traces, and — when a
  # broker is configured — files a board ticket via agent-comm when warranted.
  analyst:
    openrouter_key: null        # OpenRouter key for the analyst's own LLM calls
    global_model: null          # level-2 model (null → llmio tier-2 default)
    trace_model: null           # level-3 model (null → llmio tier-3 default)
    window_hours: 24
    top_stages: 8
    max_trace_analyses: 12      # how many top-cost traces the L3 agent may open
    schedule_hours: 0           # >0 → run automatically on this cadence
    # Ticket filing through the central agent-comm broker (optional).
    broker_host: null           # e.g. ai-broker.robotsix.net
    broker_port: 443
    broker_scheme: https
    broker_token: null          # the cost-analyst's broker bearer token
    board_manager_id: board-manager-robotsix-mill  # LLM manager it files through (dedups)
    board_agent_id: board-robotsix-mill            # structured responder (optional reads)
    board_repo_id: robotsix-cost-monitor
    # The analyst's own Langfuse project, so its L2/L3 runs are themselves traced.
    langfuse_public_key: null
    langfuse_secret_key: null
    langfuse_base_url: null
    langfuse_project_id: null
