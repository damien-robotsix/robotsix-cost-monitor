# Module taxonomy for robotsix-cost-monitor
# Each entry lists the kebab-case module id, its file paths, and a one-line
# description of its purpose.

package: robotsix_cost_monitor

modules:
  - id: robotsix-cost-monitor
    description: Package root (version + re-exports + PEP 561 type marker)
    paths:
      - src/robotsix_cost_monitor/__init__.py
      - src/robotsix_cost_monitor/py.typed

  - id: aggregations
    description: Pure cost-aggregation and transformation functions over trace dicts (no I/O)
    paths:
      - src/robotsix_cost_monitor/aggregations.py
      - tests/robotsix_cost_monitor/test_aggregations.py

  - id: app
    description: FastAPI app factory, server-rendered UI, static files
    paths:
      - src/robotsix_cost_monitor/app.py
      - src/robotsix_cost_monitor/web/index.html
      - src/robotsix_cost_monitor/web/static/dashboard.js
      - src/robotsix_cost_monitor/web/static/dashboard.css
      - tests/robotsix_cost_monitor/test_app.py
      - tests/robotsix_cost_monitor/web/static/dashboard.test.js

  - id: cli
    description: CLI entrypoint (serve, summary, reconcile)
    paths:
      - src/robotsix_cost_monitor/cli.py
      - tests/robotsix_cost_monitor/test_cli.py

  - id: config
    description: JSON config models + loader (config/projects.json)
    paths:
      - src/robotsix_cost_monitor/config.py
      - tests/robotsix_cost_monitor/test_config.py

  - id: utils
    description: Shared internal helpers (safe_load_json)
    paths:
      - src/robotsix_cost_monitor/_utils.py
      - tests/robotsix_cost_monitor/test__utils.py

  - id: exceptions
    description: Typed exception hierarchy (retriable vs terminal errors)
    paths:
      - src/robotsix_cost_monitor/exceptions.py
      - tests/robotsix_cost_monitor/test_exceptions.py

  - id: service
    description: Cross-project cost aggregation with TTL cache
    paths:
      - src/robotsix_cost_monitor/service.py
      - tests/robotsix_cost_monitor/test_service.py

  - id: reconcile
    description: OpenRouter ↔ Langfuse cost reconciliation via snapshots
    paths:
      - src/robotsix_cost_monitor/reconcile.py
      - tests/robotsix_cost_monitor/test_reconcile.py

  - id: analyst
    description: Deterministic cost digest + optional LLM proposal pass and analyst UI
    paths:
      - src/robotsix_cost_monitor/analyst.py
      - src/robotsix_cost_monitor/web/analyst.html
      - src/robotsix_cost_monitor/web/static/analyst.js
      - tests/robotsix_cost_monitor/test_analyst.py
      - tests/robotsix_cost_monitor/web/static/analyst.test.js

  - id: routes
    description: HTTP route handlers (APIRouter) and exception handlers
    paths:
      - src/robotsix_cost_monitor/routes.py
      - tests/robotsix_cost_monitor/test_routes.py

  - id: clients
    description: External API client sub-package (Langfuse, OpenRouter) including typed httpx retry client
    paths:
      - src/robotsix_cost_monitor/clients/__init__.py
      - src/robotsix_cost_monitor/clients/_http.py
      - src/robotsix_cost_monitor/clients/models.py
      - src/robotsix_cost_monitor/clients/langfuse.py
      - tests/robotsix_cost_monitor/clients/test_http.py
      - tests/robotsix_cost_monitor/clients/test_langfuse.py
      - tests/robotsix_cost_monitor/clients/test_models.py

  - id: web-shared
    description: Shared JS helpers for cost-monitor UI pages (getJSON, fmt, esc, $)
    paths:
      - src/robotsix_cost_monitor/web/static/shared.js
      - tests/robotsix_cost_monitor/web/static/shared.test.js

  - id: tests-helpers
    description: Shared pytest fixtures (event_loop), data-builders (trace, _proj, _config, _mock_client)
    paths:
      - tests/__init__.py
      - tests/robotsix_cost_monitor/helpers.py

  - id: docs-site
    description: MkDocs documentation site source files (landing page + API reference)
    paths:
      - docs/index.md
      - docs/api.md
      - docs/reference/configuration.md
      - docs/reference/cli.md

  - id: project-root
    description: Repository root metadata and configuration files
    paths:
      - .codespell-ignore
      - .dockerignore
      - .env.example
      - .markdownlint.jsonc
      - .gitignore
      - .node-version
      - .npmrc
      - .nvmrc
      - .pre-commit-config.yaml
      - .secrets.baseline
      - AGENT.md
      - ARCHITECTURE.md
      - CHANGELOG.md
      - CONTRIBUTING.md
      - Dockerfile
      - Dockerfile.dev
      - LICENSE
      - Makefile
      - README.md
      - SECURITY.md
      - biome.json
      - docker-compose.yml
      - jsconfig.json
      - mkdocs.yml
      - package-lock.json
      - package.json
      - pyproject.toml
      - .release-please-manifest.json
      - release-please-config.json
      - uv.lock
      - vitest.config.js
      - vulture_whitelist.py
      - docs/modules.yaml

  - id: github-config
    description: GitHub templates, Dependabot config, and CI/CD workflows
    paths:
      - .github/ISSUE_TEMPLATE/bug_report.yml
      - .github/ISSUE_TEMPLATE/config.yml
      - .github/ISSUE_TEMPLATE/feature_request.yml
      - .github/PULL_REQUEST_TEMPLATE.md
      - .github/dependabot.yml
      - .github/workflows/ci.yml
      - .github/workflows/codeql.yml
      - .github/workflows/dependabot-auto-merge.yml
      - .github/workflows/docs.yml
      - .github/workflows/lint-workflows.yml
      - .github/workflows/release-please.yml
      - .github/workflows/release.yml
      - .github/workflows/scan-container.yml

  - id: robotsix-mill
    description: robotsix-mill periodic task definitions and mill configuration
    paths:
      - .robotsix-mill/config.yaml
      - .robotsix-mill/periodic/audit.yaml
      - .robotsix-mill/periodic/bc_check.yaml
      - .robotsix-mill/periodic/changelog_autofill.yaml
      - .robotsix-mill/periodic/completeness_check.yaml
      - .robotsix-mill/periodic/copy_paste.yaml
      - .robotsix-mill/periodic/health.yaml
      - .robotsix-mill/periodic/module_curator.yaml
      - .robotsix-mill/periodic/repo_description_sync.yaml
      - .robotsix-mill/periodic/security_posture.yaml
      - .robotsix-mill/periodic/survey.yaml
      - .robotsix-mill/periodic/test_gap.yaml
      - .robotsix-mill/periodic/trace_review.yaml
      - .robotsix-mill/periodic/triage_boilerplate.yaml
      - .robotsix-mill/periodic/repo_description_sync.yaml

  - id: module-taxonomy
    description: Module taxonomy schema and vendored validation script
    paths:
      - scripts/modules.schema.yaml
      - scripts/validate_modules.py

  - id: deploy
    description: Deployment configuration (Docker Compose, environment examples, documentation)
    paths:
      - deploy/.env.example
      - deploy/README.md
      - deploy/docker-compose.yml

  - id: config-files
    description: User-facing project configuration files (example config, JSON schema) and schema generation script
    paths:
      - config/projects.example.json
      - config/projects.schema.json
      - scripts/generate_config_schema.py
