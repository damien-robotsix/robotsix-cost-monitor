<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>robotsix · cost analyst</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body>
  <header>
    <h1>cost analyst</h1>
    <div class="controls">
      <a class="navlink" href="/">← dashboard</a>
    </div>
  </header>

  <main>
    <div class="panel-head section-head">
      <h2>fleet cost analysis</h2>
      <button id="run-btn" class="analyze-btn" title="run a fresh fleet analysis">analyze</button>
    </div>
    <section class="cards" id="run-meta"></section>

    <section class="panel">
      <h2>summary</h2>
      <div id="summary"></div>
    </section>

    <section class="panel">
      <h2>traces analyzed (and why)</h2>
      <div id="analyzed"></div>
    </section>

    <section class="panel">
      <h2>proposals</h2>
      <div id="proposals"></div>
    </section>

    <section class="panel">
      <h2>tickets (board manager)</h2>
      <div id="ticket"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>most costly ticket — global analysis</h2>
        <button id="ticket-btn" class="analyze-btn" title="analyze the most expensive ticket over its lifecycle">analyze</button>
      </div>
      <div id="ticket-analysis"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>most costly stage — global analysis</h2>
        <button id="stage-btn" class="analyze-btn" title="analyze the most expensive stage across the fleet">analyze</button>
      </div>
      <div id="stage-analysis"></div>
    </section>
  </main>

  <footer><span id="status"></span></footer>
  <script type="module" src="/static/analyst.js"></script>
</body>
</html>
