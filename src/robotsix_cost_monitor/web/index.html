<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>robotsix · cost monitor</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body>
  <header>
    <h1>cost monitor</h1>
    <div class="controls">
      <label>project
        <select id="project"><option value="all">all projects</option></select>
      </label>
      <label>backend
        <select id="backend"><option value="all">all backends</option></select>
      </label>
      <label>window
        <select id="window">
          <option value="1">1h</option>
          <option value="6">6h</option>
          <option value="24">1d</option>
          <option value="168" selected>1w</option>
        </select>
      </label>
      <button id="refresh" title="refresh">↻</button>
      <a class="navlink" href="/analyst">cost analyst →</a>
    </div>
  </header>

  <main>
    <div id="recon-banner" class="banner" hidden></div>
    <section class="cards" id="summary-cards"></section>

    <section class="panel">
      <h2>cost over time</h2>
      <canvas id="trend" height="120"></canvas>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>cost by agent / stage</h2>
        <div class="muted" style="font-size:11px;margin-bottom:10px">OpenRouter = marginal pay-per-token cash; subscription = fixed Claude-SDK estimate (paid regardless of volume)</div>
        <div id="by-agent-segmented" class="bars"></div>
        <div id="by-agent" class="bars"></div>
      </div>
      <div class="panel">
        <h2>cost by model</h2>
        <div id="by-model" class="bars"></div>
      </div>
    </section>

    <section class="panel">
      <h2>highlights</h2>
      <div id="highlights"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>OpenRouter ↔ Langfuse reconciliation</h2>
        <span id="recon-when" class="muted"></span>
        <button id="reconcile-btn">run</button>
      </div>
      <div id="reconcile"></div>
    </section>
  </main>

  <footer><span id="status"></span></footer>
  <script type="module" src="/static/dashboard.js"></script>
</body>
</html>
