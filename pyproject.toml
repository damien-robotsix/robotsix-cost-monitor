[project]
name = "robotsix-cost-monitor"
version = "0.1.0"
description = "Multi-Langfuse cost monitoring dashboard, OpenRouter↔Langfuse reconciliation, and an LLM cost-reduction analyst."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "httpx>=0.28",
    "pydantic>=2.10",
    "robotsix-yaml-config @ git+https://github.com/damien-robotsix/robotsix-yaml-config.git@main",
]

[project.optional-dependencies]
# The LLM cost-analyst (optional — the dashboard + reconciliation work without it).
# robotsix-llmio drives the level-2/level-3 OpenRouter agents; robotsix-agent-comm
# is the pull/mailbox client that files board tickets through the central broker.
analyst = [
    "robotsix-llmio[openrouter_deepseek,claude_sdk] @ git+https://github.com/damien-robotsix/robotsix-llmio.git@main",
    "robotsix-agent-comm @ git+https://github.com/damien-robotsix/robotsix-agent-comm.git@main",
]

[project.scripts]
robotsix-cost-monitor = "robotsix_cost_monitor.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "ruff>=0.15",
    "mypy>=1.13",
    "vulture>=2.11",
]
docs = [
    "mkdocs-material>=9",
    "mkdocstrings[python]>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/robotsix_cost_monitor"]

# Allow the direct git references for robotsix-llmio / robotsix-agent-comm in
# the optional `analyst` extra.
[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S"]
ignore = ["S101"]  # assert in tests

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "E501"]
"vulture_whitelist.py" = ["B018", "F821"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true

# Optional `analyst` extra — lazy-imported inside analyst.py, not installed in
# the base/dev env, so don't fail typecheck on missing stubs.
[[tool.mypy.overrides]]
module = [
    "robotsix_llmio.*",
    "robotsix_agent_comm.*",
]
ignore_missing_imports = true

[tool.coverage.run]
branch = true
source = ["src"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
