[project]
name = "robotsix-cost-monitor"
version = "0.1.0"
description = "Multi-Langfuse cost monitoring dashboard, OpenRouter↔Langfuse reconciliation, and an LLM cost-reduction analyst."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "httpx>=0.28",
    "pydantic>=2.10",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# The LLM cost-analyst (optional — the dashboard + reconciliation work without it).
analyst = [
    "openai>=1.0",
]

[project.scripts]
robotsix-cost-monitor = "robotsix_cost_monitor.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.15",
    "mypy>=1.13",
    "types-pyyaml>=6.0",
]
docs = [
    "mkdocs-material>=9",
    "mkdocstrings[python]>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/robotsix_cost_monitor"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S"]
ignore = ["S101"]  # assert in tests

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
