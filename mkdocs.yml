site_name: robotsix-cost-monitor
repo_url: https://github.com/damien-robotsix/robotsix-cost-monitor

theme:
  name: material
  palette:
    # Dark/light palette toggle (system preference by default)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Reference:
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
  - API Reference: api.md
