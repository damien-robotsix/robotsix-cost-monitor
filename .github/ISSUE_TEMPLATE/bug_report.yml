name: Bug report
description: File a bug report to help us improve.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Steps to reproduce the behaviour:
        1. Run '...'
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs actual behaviour
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      description: Which Python version are you using?
      options:
        - "3.14"
        - "3.13"
        - "3.12"
        - "Other (describe in description)"
    validations:
      required: true

  - type: dropdown
    id: config-setup
    attributes:
      label: Config setup
      description: How is the project configured?
      options:
        - "config/config.json (full config)"
        - "env vars only"
        - "unsure / other"

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots / logs
      description: If applicable, paste relevant logs or screenshots.
