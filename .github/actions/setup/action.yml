name: Setup Python environment
description: Install Python and sync uv deps
inputs:
  python-version:
    description: Python version
    default: "3.14"
  extras:
    description: Extra dependency group (e.g. analyst)
    default: ""
runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ inputs.python-version }}
    - run: uv sync --frozen ${{ inputs.extras && format('--group {0}', inputs.extras) || '' }}
      shell: bash
