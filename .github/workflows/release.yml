name: Release

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}  # no workflow-level default; each job grants its own

jobs:
  sbom:
    name: Generate and attest SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # id-token: write and attestations: write needed to generate provenance attestation
    permissions:
      contents: read
      id-token: write  # generate provenance attestation OIDC token
      attestations: write  # write build provenance attestation
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - run: uv sync --locked
      - name: Generate CycloneDX SBOM
        run: uv export --format cyclonedx1.5 --frozen --extra analyst --preview-features sbom-export > sbom.cyclonedx.json
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: sbom.cyclonedx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cyclonedx.json

  publish:
    name: Publish release
    needs: sbom
    # packages: write to push Docker image, id-token: write and attestations: write to sign and attest
    permissions:
      contents: read
      packages: write  # push Docker image to GHCR
      id-token: write  # sign image via OIDC
      attestations: write  # write image attestation
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/docker-release.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15 # main
    secrets: inherit  # zizmor: ignore[secrets-inherit] -- reusable workflow needs full secret access
