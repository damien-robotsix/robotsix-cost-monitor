name: Release

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/docker-release.yml@a063c729739539138db80ce72c82a35e38eb76f9  # maintainers: update SHA and version together
    secrets: inherit
