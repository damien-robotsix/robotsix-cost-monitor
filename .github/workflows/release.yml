name: Release image

# Publishes container images to GHCR:
#   - push to `main`     -> moving `main` tag (Watchtower's continuous-deploy target)
#   - push of a `v*` tag -> semver tags (`1.2.3`, `1.2`, `1`) plus `latest`
# Every build also gets a `sha-<short>` tag. See deploy/README.md for how the
# server consumes the `main` tag via Watchtower.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write        # required for provenance/SBOM attestation signing
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      # The default `docker` driver cannot emit provenance/SBOM attestations
      # (see the build step). setup-buildx-action provisions the
      # `docker-container` driver, which supports them.
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max   # SLSA build provenance
          sbom: true             # CycloneDX/SPDX SBOM attestation
