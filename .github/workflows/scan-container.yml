name: Weekly container vulnerability rescan
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
permissions: {}  # no workflow-level default; the job grants what it needs
jobs:
  rescan:
    name: Weekly container vulnerability rescan
    permissions:
      contents: read
      security-events: write  # upload vulnerability scan results to the Security tab
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/scan-container.yml@5fdc956e980cfb70ea36e33bc670a0376750dec6  # main
