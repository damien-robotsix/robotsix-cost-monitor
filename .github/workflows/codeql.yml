name: CodeQL Analysis
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**/*.py'
      - '**/*.js'
      - '**/*.ts'
permissions:
  contents: read
jobs:
  codeql:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/codeql.yml@5fdc956e980cfb70ea36e33bc670a0376750dec6  # main
    permissions:
      contents: read
      security-events: write
    with:
      languages: python,javascript-typescript
