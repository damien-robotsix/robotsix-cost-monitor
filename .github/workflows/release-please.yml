name: Release-Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        # GITHUB_TOKEN is blocked from creating PRs when the repository
        # has "Allow GitHub Actions to create and approve pull requests"
        # disabled. Use a classic PAT with `repo` scope instead.
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
