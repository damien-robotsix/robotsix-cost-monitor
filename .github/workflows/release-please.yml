name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # required to create releases and tags
      pull-requests: write  # required to manage release PRs
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.2.0
        # GITHUB_TOKEN cannot create PRs when the repo setting
        # "Allow GitHub Actions to create and approve pull requests"
        # is disabled. Use a classic PAT with `repo` scope instead.
        # Falls back to github.token when RELEASE_PLEASE_TOKEN is not
        # configured (the action will then fail with a permissions error
        # instead of "token not supplied").
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
