name: Release-Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071  # v4
        # GITHUB_TOKEN is blocked from creating PRs when the repository
        # has "Allow GitHub Actions to create and approve pull requests"
        # disabled. Use a classic PAT with `repo` scope instead.
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
