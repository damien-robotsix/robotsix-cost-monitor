name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # required to create releases and tags
      pull-requests: write  # required to manage release PRs
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check release token
        id: check-token
        env:
          TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.2.0
        if: steps.check-token.outputs.available == 'true'
        # GITHUB_TOKEN cannot create PRs when the repo setting
        # "Allow GitHub Actions to create and approve pull requests"
        # is disabled. Use a classic PAT with `repo` scope instead.
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
