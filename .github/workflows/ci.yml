name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231 # v5.4.2
      - run: uv sync --locked

  ci:
    # The reusable python-ci.yml's nested `tests` job uploads SARIF, so it
    # requests `security-events: write`. A caller job MUST grant at least that
    # or GitHub rejects the reusable-workflow call with a startup_failure
    # ("nested job 'tests' is requesting 'security-events: write'"). The
    # `security` job below already does this; the `ci` job was missing it.
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@a317d51ad25be89194d55f220164819807d549f1 # v0.0.1
    with:
      # The project requires Python >=3.14 (see pyproject `requires-python`); a
      # 3.12 runner fails dependency install with "No interpreter found".
      python-version: "3.14"
      install-extras: "analyst"
      cov-package: "robotsix_cost_monitor"
    secrets: inherit

  security:
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@a317d51ad25be89194d55f220164819807d549f1 # v0.0.1
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
    secrets: inherit

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: "20"
      - run: npm install
      - run: npm test
