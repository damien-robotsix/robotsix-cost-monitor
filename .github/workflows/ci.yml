name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@main
    with:
      python-version: "3.12"
      install-extras: "analyst"
      cov-package: "robotsix_cost_monitor"
    secrets: inherit

  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@a063c729739539138db80ce72c82a35e38eb76f9
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
