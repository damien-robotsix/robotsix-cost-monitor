name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Minimal default: only need to read repository contents
  contents: read

jobs:
  lockfile-check:
    name: Lockfile integrity check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.14"
      - run: uv lock --check

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # contents: read for checkout, pull-requests: write to post dependency review comments
    permissions:
      contents: read
      pull-requests: write  # dependency-review-action posts findings as PR comments
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: moderate

  dependency-hygiene:
    name: Dependency hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv
      UV_MALWARE_CHECK: "1"
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.14"
      - run: uv sync --locked --all-extras
      - run: uv run --with deptry deptry .

  module-validation:
    name: Module taxonomy validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_MALWARE_CHECK: "1"
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - run: uv sync --locked || echo "::warning::uv sync failed (possibly offline) — will try vendored fallback"
      - name: Validate module taxonomy
        run: |
          if [ -x .venv/bin/robotsix-modules-validate ]; then
            uv run robotsix-modules-validate docs/modules.yaml
          elif uv run --no-project --with pyyaml --with jsonschema python scripts/validate_modules.py docs/modules.yaml 2>/dev/null; then
            :  # vendored fallback succeeded
          else
            echo "::warning::module taxonomy validation skipped — neither primary nor vendored validator is available"
          fi

  config-schema:
    name: Config schema freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv
      UV_MALWARE_CHECK: "1"
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - run: uv sync --locked
      - run: uv run python scripts/generate_config_schema.py
      - name: Check schema is up to date
        run: git diff --exit-code config/projects.schema.json

  vulnerability-audit:
    name: Vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv
      UV_MALWARE_CHECK: "1"
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: false
      - run: uv sync --locked
      - run: uv audit --frozen

  ci:
    name: CI (Python tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # for SARIF upload (reserved; not used in air-gapped CI)
    env:
      UV_CACHE_DIR: .cache/uv
      UV_MALWARE_CHECK: "1"
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.14"
      - run: uv sync --locked --extra analyst --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src/ tests/
      - run: uv run pytest --cov=robotsix_cost_monitor --cov-report=term-missing

  dead-code:
    name: Dead code detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv
      UV_MALWARE_CHECK: "1"
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.14"
      - run: uv sync --locked --group lint
      - run: uv run vulture --min-confidence 80 --ignore-decorators "@field_validator,@model_validator" src/ tests/ vulture_whitelist.py

  security:
    name: Security scans
    # security-events: write needed to upload SARIF results to the Security tab
    permissions:
      contents: read
      security-events: write  # upload SARIF scan results to the Security tab
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15 # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
    secrets: inherit  # zizmor: ignore[secrets-inherit] -- reusable workflow needs full secret access

  baseline:
    name: Baseline check
    # Minimal permissions: only need to read the repository
    permissions:
      contents: read
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/baseline-check.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15 # main
    with:
      has-docker: true

  workflow-audit:
    name: Workflow audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - run: uvx zizmor --min-severity medium .github/workflows/

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv
      UV_MALWARE_CHECK: "1"
    # actions: read needed to download artifacts from prior jobs
    permissions:
      contents: read
      actions: read  # download build artifacts from prior jobs
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.14"
      - run: uv sync --locked
      - name: Generate CycloneDX SBOM
        run: uv export --format cyclonedx1.5 --frozen --extra analyst --preview-features sbom-export > sbom.cyclonedx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cyclonedx.json

  js-tests:
    name: JavaScript tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # pull-requests: write needed for Socket.dev to post PR comments
    permissions:
      contents: read
      pull-requests: write  # Socket.dev posts firewall findings as PR comments
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm audit signatures
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f  # v1.3.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: firewall
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm run coverage
      - name: Upload JS coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: js-coverage
          path: coverage/
