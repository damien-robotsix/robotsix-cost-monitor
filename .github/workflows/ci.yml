name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # The reusable python-ci.yml's nested `tests` job uploads SARIF, so it
    # requests `security-events: write`. A caller job MUST grant at least that
    # or GitHub rejects the reusable-workflow call with a startup_failure
    # ("nested job 'tests' is requesting 'security-events: write'"). The
    # `security` job below already does this; the `ci` job was missing it.
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@a317d51ad25be89194d55f220164819807d549f1 # v0.0.1
    with:
      python-version: "3.12"
      install-extras: "analyst"
      cov-package: "robotsix_cost_monitor"
    secrets: inherit

  security:
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@a317d51ad25be89194d55f220164819807d549f1 # v0.0.1
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
    secrets: inherit
