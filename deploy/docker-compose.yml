# -------------------------------------------------------------------------
# robotsix-cost-monitor — central-deploy stack for server.robotsix.net.
#
# Unlike the repo-root docker-compose.yml (which BUILDS the image for local
# development), this stack PULLS the published image from GHCR. Central-deploy
# replaces the former Watchtower continuous-pull pattern with button-triggered
# deploys via the central-deploy system.
#
# Services:
#   - cost-monitor : the dashboard, bound to 127.0.0.1 ONLY. A shared host
#                    nginx terminates TLS + basic auth for
#                    cost.robotsix.net and proxies to it.
#
# Bring-up and one-shot commands are documented in ./README.md.
# -------------------------------------------------------------------------

name: robotsix-cost-monitor

x-central-deploy:
  contract-version: "1.0"
  description: >
    robotsix-cost-monitor — Langfuse cost dashboard for server.robotsix.net.
    Pulls the published GHCR image and serves on 127.0.0.1:8099 behind
    the shared host nginx.

services:
  cost-monitor:
    image: ghcr.io/damien-robotsix/robotsix-cost-monitor:${IMAGE_TAG:-main}
    # The image healthcheck probes :8080, so the server must serve on 8080.
    command: serve --host 0.0.0.0 --port 8080
    restart: unless-stopped

    # Loopback-only publish: the dashboard has NO auth of its own, so it must
    # never be reachable directly from the internet. The shared host nginx
    # proxies cost.robotsix.net -> 127.0.0.1:8099 with TLS + basic auth.
    ports:
      - "127.0.0.1:${MONITOR_PORT:-8099}:8080"

    volumes:
      # Named volumes — the central-deploy system manages lifecycle.
      - rcm-config:/home/appuser/config
      - rcm-data:/home/appuser/.data

    environment:
      # Runtime state directory — the named volume mounts at /home/appuser/.data,
      # but the app also looks for COST_MONITOR_DATA. Set it explicitly so the
      # env-var path takes precedence over the (container-irrelevant) relative
      # path fallback in config.py.
      COST_MONITOR_CONFIG: /home/appuser/config/projects.yaml
      COST_MONITOR_DATA: /home/appuser/.data

volumes:
  rcm-config:
    # Config is provisioned externally by the central-deploy system.
    # On first deploy, copy config/projects.yaml from the release artifact.
  rcm-data:
    # Runtime state (reconciliation snapshots, analyst proposals) persists
    # across redeploys.
