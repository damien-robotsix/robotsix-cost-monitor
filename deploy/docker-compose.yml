# -------------------------------------------------------------------------
# robotsix-cost-monitor — continuous-deploy stack for server.robotsix.net.
#
# Unlike the repo-root docker-compose.yml (which BUILDS the image for local
# development), this stack PULLS the published image from GHCR and lets
# Watchtower redeploy it automatically whenever a new `main` image is pushed
# (see ../.github/workflows/release.yml).
#
# Services:
#   - cost-monitor : the dashboard, bound to 127.0.0.1 ONLY. A shared host
#                    nginx terminates TLS + basic auth for
#                    cost.robotsix.net and proxies to it.
#   - watchtower   : polls GHCR and redeploys the labeled service on a new
#                    image, then prunes the old one.
#
# Bring-up and one-shot commands are documented in ./README.md.
# -------------------------------------------------------------------------

name: robotsix-cost-monitor

services:
  cost-monitor:
    image: ghcr.io/damien-robotsix/robotsix-cost-monitor:${IMAGE_TAG:-main}
    # The image healthcheck probes :8080, so the server must serve on 8080.
    command: serve --host 0.0.0.0 --port 8080
    restart: unless-stopped

    # Loopback-only publish: the dashboard has NO auth of its own, so it must
    # never be reachable directly from the internet. The shared host nginx
    # proxies cost.robotsix.net -> 127.0.0.1:8099 with TLS + basic auth.
    ports:
      - "127.0.0.1:${MONITOR_PORT:-8099}:8080"

    volumes:
      # Config bind-mount — projects.yaml available without an image rebuild.
      - ./config:/home/appuser/config
      # Runtime state — reconciliation snapshots + analyst proposals persist.
      - ./data:/home/appuser/.data

    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      # Only watch containers carrying the enable=true label above, so
      # Watchtower never touches other stacks on this host.
      WATCHTOWER_LABEL_ENABLE: "true"
      # Remove the previous image after a successful update.
      WATCHTOWER_CLEANUP: "true"
      # Poll GHCR every 5 minutes.
      WATCHTOWER_POLL_INTERVAL: "300"
      # Update services one at a time instead of stopping all, then starting all.
      WATCHTOWER_ROLLING_RESTART: "true"
      # Docker Engine 29+ rejects API clients older than 1.44; the version
      # bundled in containrrr/watchtower is older, so pin the negotiated API
      # version (otherwise watchtower crash-loops with "client version ... is
      # too old").
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # If the GHCR package is PRIVATE, Watchtower needs pull credentials.
      # Run `docker login ghcr.io` on the host, then uncomment the next line
      # (path is for a root-owned daemon; adjust for your user).
      # - /root/.docker/config.json:/config.json:ro
